{% extends "base.html" %}
{% block title %}Card Closed – WishTogether{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-6 py-24 text-center">
  <span class="text-6xl">🔒</span>
  <h1 class="font-display text-3xl font-bold text-gray-900 mt-6 mb-3">
    This card is closed!
  </h1>
  <p class="text-gray-500 text-lg">
    The card for <strong>{{ card.honoree_name }}</strong> is already complete — 
    no more messages can be added.
  </p>
  <a href="/" class="inline-block mt-8 bg-gradient-to-r from-pink-500 to-purple-600 text-white font-bold px-8 py-3 rounded-2xl hover:shadow-lg transition">
    Create a New Card 🎂
  </a>
</div>
{% endblock %}
